spring.application.name=Unit_Converter_Backend

spring.datasource.url=jdbc:mysql://localhost:3306/unit_converter_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

jwt.secret=aVeryStrongSecretKeyForUnitConverterApp1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef
jwt.expiration=86400000